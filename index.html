<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Palette</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h1>Color Palettes</h1>
      <div id="palette-list" class="palette-list"></div>
      <div class="sidebar-controls">
        <div class="sort-group">
          <span class="sort-label">Sort</span>
          <label class="radio-label"><input type="radio" name="sort" value="none" checked /> None</label>
          <label class="radio-label"><input type="radio" name="sort" value="hue" /> By Hue</label>
<label class="radio-label"><input type="radio" name="sort" value="lightness" /> By Lightness</label>
          <label class="radio-label"><input type="radio" name="sort" value="name" /> By Name</label>
          <label class="radio-label"><input type="radio" name="sort" value="saturation" /> By Saturation</label>
        </div>
        <div class="match-group">
          <span class="sort-label">Match a Color</span>

          <!-- Image picker -->
          <input type="file" id="image-upload" accept="image/*" capture="environment" style="display:none" />
          <div id="image-picker-wrap" class="image-picker-wrap" style="display:none">
            <canvas id="image-picker-canvas" class="image-picker-canvas"></canvas>
            <button id="image-picker-clear" class="image-picker-clear" title="Remove image">×</button>
          </div>
          <button id="image-upload-btn" class="image-upload-btn">Upload image</button>

          <!-- Existing hex input row (unchanged) -->
          <div class="match-input-row">
            <input type="text" id="match-input" class="match-input" placeholder="#A3B2C1" maxlength="7" spellcheck="false" />
            <div id="match-preview" class="match-preview"></div>
          </div>
          <div id="match-results" class="match-results"></div>
        </div>

        <!-- Hover swatch: fixed, follows cursor, outside sidebar -->
        <div id="picker-hover-swatch" class="picker-hover-swatch" style="display:none">
          <div id="picker-hover-color" class="picker-hover-color"></div>
          <span id="picker-hover-hex" class="picker-hover-hex"></span>
        </div>
        <button id="export-pdf">Export PDF</button>
      </div>
    </aside>
    <main class="main">
      <div id="color-grid" class="color-grid"></div>
    </main>
  </div>

  <div id="overlay" class="overlay" style="display:none;">
    <button id="overlay-close">✕</button>
    <div class="overlay-info">
      <div id="overlay-hex" class="overlay-hex"></div>
      <div id="overlay-name" class="overlay-name"></div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
